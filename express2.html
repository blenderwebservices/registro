  <script>
    $(document).on('ready', function() {
      $("#boton").hide();

      var getUrlParameter = function getUrlParameter(sParam) {
        var sPageURL = decodeURIComponent(window.location.search.substring(1)),
            sURLVariables = sPageURL.split('&'),
            sParameterName,
            i;

        for (i = 0; i < sURLVariables.length; i++) {
            sParameterName = sURLVariables[i].split('=');

            if (sParameterName[0] === sParam) {
                return sParameterName[1] === undefined ? true : sParameterName[1];
            }
        }
      };

      var fuente = getUrlParameter('fuente');
      $('#fuente').val(fuente);

    
    $("#formulario").change(function () {	
        if($("#email").val() != "" && $("#email").val() != "Texto antes del @..." && $("#dominio").val() != "" && $("#dominio").val() != "Ejem. hotmail.com, gmail.com, etc."){
            if( $("#formulario input[name='genero']:radio").is(':checked')) {  
                if( $("#formulario input[name='edad']:radio").is(':checked')) {
                    if( $('#formulario  .entero').is(':checked') ) {
                          $("#boton").show();
                          $("#img_boton").hide();
                          $("#guardar").val("ok");                 
                    } else {
                      quitar_boton();
                    }
                }else{
                  quitar_boton();
                }
            } else{  
              quitar_boton();
            }
        }else{
          quitar_boton();
        }
         
    });
    
    function quitar_boton(){
      $("#boton").hide();
      $("#img_boton").show();
      $("#guardar").val("");
    }

    



  })
</script>
